name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag
        run: |
          echo "# CI auto-updated" >> apps/todo-api/base/deployment.yaml

      - name: Commit & Push
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add apps/todo-api/
          git commit -m "ci: auto-update [skip ci]" || true
          git push origin main
