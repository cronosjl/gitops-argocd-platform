apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api
  labels:
    app: todo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
      - name: todo-api
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
  strategy:
    blueGreen:
      activeService: todo-api-active
      previewService: todo-api-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
