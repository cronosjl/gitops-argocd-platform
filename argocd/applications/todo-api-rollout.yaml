apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-api-rollout
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cronosjl/gitops-argocd-platform.git
    targetRevision: main
    path: apps/todo-api/rollouts/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-api-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
