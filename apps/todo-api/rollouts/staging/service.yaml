apiVersion: v1
kind: Service
metadata:
  name: todo-api-rollout
  labels:
    app: todo-api
spec:
  type: ClusterIP
  selector:
    app: todo-api
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
