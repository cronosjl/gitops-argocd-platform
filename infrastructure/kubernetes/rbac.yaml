apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-api-sa
  namespace: todo-api-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todo-api-role
  namespace: todo-api-prod
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todo-api-rolebinding
  namespace: todo-api-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: todo-api-role
subjects:
- kind: ServiceAccount
  name: todo-api-sa
  namespace: todo-api-prod
