apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: todo-api-netpol
  namespace: todo-api-prod
spec:
  podSelector:
    matchLabels:
      app: todo-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          environment: prod
    ports:
    - protocol: TCP
      port: 3000
