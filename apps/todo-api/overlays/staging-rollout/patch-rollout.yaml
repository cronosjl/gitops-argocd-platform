apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
spec:
  replicas: 2
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api
  namespace: todo-api-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
      - name: todo-api
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80
          name: http
  strategy:
    blueGreen:
      activeSlot: blue
      previewSlot: green
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
