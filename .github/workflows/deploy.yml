name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_TOKEN }}

      - name: Update image tag
        run: |
          echo "Updated: $(date)" >> apps/todo-api/base/deployment.yaml

      - name: Commit & Push
        run: |
          git config user.email "louis@example.com"
          git config user.name "Louis CI"
          git add apps/todo-api/
          git commit -m "ci: update image [skip ci]" || true
          git push https://x-access-token:${{ secrets.CI_TOKEN }}@github.com/cronosjl/argocd.git main
